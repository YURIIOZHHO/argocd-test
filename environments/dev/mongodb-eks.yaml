apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: psmdb-mongodb
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: crds
            repoURL: https://percona.github.io/percona-helm-charts/
            chart: psmdb-operator-crds
            targetRevision: 1.22.0
            path: ""
            namespace: mongodb-eks
          - name: operator
            repoURL: https://percona.github.io/percona-helm-charts/
            chart: psmdb-operator
            targetRevision: 1.22.0
            path: ""
            namespace: mongodb-eks
          - name: mongodb-cr
            repoURL: "https://github.com/YURIIOZHHO/argocd-test.git"
            path: "charts/mongodb-eks/dev"
            targetRevision: main
            namespace: mongodb-eks
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        path: '{{path}}'
        targetRevision: '{{targetRevision}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
  strategy:
    hook:
      dependsOn:
        - crds
        - operator